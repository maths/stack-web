<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 850 650"
     style="max-width:100%;height:auto;">

  <defs>
    <linearGradient id="formatGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#f7b0b0"/>
    </linearGradient>

    <linearGradient id="inputGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#d7e8ff"/>
    </linearGradient>

    <linearGradient id="assessmentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#fff0a0"/>
    </linearGradient>

    <linearGradient id="calcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#ffd199"/>
    </linearGradient>

    <marker id="arrow"
            markerWidth="10"
            markerHeight="10"
            refX="8"
            refY="3"
            orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="currentColor"/>
    </marker>
  </defs>

  <style>
    text {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 15px;
      dominant-baseline: middle;
      text-anchor: middle;
    }

    .format {
      fill:url(#formatGrad);
      stroke:#d66;
      stroke-width:2.5;
    }

    .input {
      fill:url(#inputGrad);
      stroke:#666;
      stroke-width:2;
    }

    .inputnew {
      fill:white;
      stroke:#888;
      stroke-width:2;
      stroke-dasharray:6 4;
    }

    .assessment {
      fill:url(#assessmentGrad);
      stroke:#d9c93a;
      stroke-width:2;
    }

    .calculator {
      fill:url(#calcGrad);
      stroke:#f0a040;
      stroke-width:2;
    }

    .link {
      fill:none;
      stroke:#000;
      stroke-width:2;
    }

    .bidir {
      fill:none;
      stroke:#000;
      stroke-width:2;
    }

    .dashed {
      stroke:#777;
      stroke-dasharray:6 4;
    }

    .orange {
      stroke:orange;
    }

    .red {
      stroke:red;
      stroke-width:5;
    }
  </style>

  <!-- Outer border -->
  <rect x="10" y="20"
        width="840" height="600"
        rx="8" ry="8"
        fill="white"
        stroke="#999"
        stroke-width="2"/>

  <!-- Text-based format -->
  <rect class="format" x="430" y="260" rx="18" ry="18" width="180" height="60"/>
  <text x="520" y="290">Text-based format</text>

  <!-- Keyboard editing -->
  <rect class="input" x="450" y="160" rx="6" ry="6" width="160" height="45"/>
  <text x="530" y="182">Keyboard editing</text>

  <!-- Equation editor -->
  <rect class="input" x="250" y="160" rx="6" ry="6" width="160" height="45"/>
  <text x="330" y="182">Equation editor</text>

  <!-- WYSIWYG -->
  <rect class="inputnew" x="250" y="90" rx="6" ry="6" width="160" height="45"/>
  <text x="330" y="112">WYSIWYG editor</text>

  <!-- Assessment outputs -->
  <rect class="assessment" x="700" y="180" rx="12" ry="12" width="130" height="45"/>
  <text x="765" y="202">Human</text>

  <rect class="assessment" x="700" y="260" rx="12" ry="12" width="130" height="45"/>
  <text x="765" y="282">STACK</text>

  <rect class="assessment" x="700" y="340" rx="12" ry="12" width="130" height="45"/>
  <text x="765" y="362">AI</text>

  <!-- OCR (moved right) -->
  <rect class="assessment" x="220" y="260" rx="12" ry="12" width="100" height="45"/>
  <text x="270" y="282">OCR</text>

  <!-- Inputs (moved back left) -->
  <rect class="input" x="20" y="170" rx="6" ry="6" width="130" height="40"/>
  <text x="85" y="190">Handwriting</text>

  <rect class="input" x="20" y="250" rx="6" ry="6" width="130" height="40"/>
  <text x="85" y="270">Writing tablet</text>

  <rect class="input" x="20" y="320" rx="6" ry="6" width="130" height="40"/>
  <text x="85" y="340">Phone camera</text>

  <!-- Calculator -->
  <rect class="calculator" x="450" y="380" rx="12" ry="12" width="140" height="45"/>
  <text x="520" y="402">Calculator</text>

  <!-- Future tools -->
  <rect class="inputnew" x="430" y="470" rx="6" ry="6" width="180" height="40"/>
  <text x="520" y="490">Graph plotter ?</text>

  <rect class="inputnew" x="430" y="540" rx="6" ry="6" width="180" height="40"/>
  <text x="520" y="560">Diagram editor ?</text>

  <!-- WYSIWYG <-> Text format -->
  <path class="bidir dashed"
        d="M330 135
           C330 180 390 210 430 260"/>

  <!-- Keyboard <-> Text format -->
  <line class="link"
        x1="530" y1="205"
        x2="520" y2="260"/>

  <!-- Equation editor -> Text format -->
  <path class="link"
        d="M330 205 C330 235 410 240 500 260"/>

  <!-- Calculator <-> Text format -->
  <line class="orange"
        x1="520" y1="380"
        x2="520" y2="320"/>

  <!-- Handwriting -> OCR -->
  <path class="link"
        d="M150 190 C180 190 200 240 220 282"/>

  <!-- Writing tablet -> OCR -->
  <path class="link"
        d="M150 270 C180 270 200 276 220 282"/>

  <!-- Phone camera -> OCR -->
  <path class="link"
        d="M150 340 C180 340 200 320 220 282"/>

  <!-- OCR -> Text-based format -->
  <line class="link"
        x1="320" y1="282"
        x2="430" y2="290"/>

  <!-- Text format -> Human -->
  <path class="link"
        d="M610 280 C650 250 680 202 700 202"/>

  <!-- Text format -> STACK -->
  <path class="link"
        d="M610 290 C650 290 680 282 700 282"/>

  <!-- Text format -> AI -->
  <path class="link"
        d="M610 300 C650 330 680 362 700 362"/>

  <!-- STACK <-> AI -->
  <line class="red"
        x1="765" y1="305"
        x2="765" y2="340"/>

  <!-- Graph plotter -> Text format -->
  <path class="link dashed"
        d="M430 490 C380 470 430 330 470 320"/>

  <!-- Diagram editor -> Text format -->
  <path class="link dashed"
        d="M430 560 C370 520 420 350 470 320"/>

  <!-- Diagram editor -> OCR -->
  <path class="link dashed"
        d="M430 560 C320 560 280 470 270 305"/>

</svg>
